<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEase - Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">ShopEase</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link active" href="cart.html">Cart (<span class="cart-count">0</span>)</a></li>
          <li class="nav-item"><a class="nav-link" href="checkout.html">Checkout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="py-5">
    <div class="container">
      <h2 class="section-title">Your Cart</h2>

      <div class="row g-4">
        <div class="col-lg-8">
          <div id="cartItems"></div>
        </div>

        <div class="col-lg-4">
          <div class="summary-box">
            <h4>Order Summary</h4>
            <hr>
            <p class="d-flex justify-content-between">
              <span>Subtotal</span>
              <strong id="subtotal">Rs. 0</strong>
            </p>
            <p class="d-flex justify-content-between">
              <span>Total</span>
              <strong id="total">Rs. 0</strong>
            </p>
            <a href="checkout.html" class="btn btn-success w-100 mt-3">Proceed to Checkout</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container text-center">
      <p class="mb-0">© 2026 ShopEase. All rights reserved.</p>
    </div>
  </footer>

  <script src="products.js"></script>
  <script src="cart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
